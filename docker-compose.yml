services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boundflow
      POSTGRES_USER: boundflow
      POSTGRES_PASSWORD: boundflow
    # Not published to the host: only the in-network services need it, and not
    # publishing avoids clashing with a Postgres the user already runs on 5432.
    # Inspect on demand with: docker compose exec postgres psql -U boundflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boundflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["-mode=migrate"]
    environment:
      BOUNDFLOW_DATABASE_URL: postgres://boundflow:boundflow@postgres:5432/boundflow?sslmode=disable
      # Shard count — must match the server/scheduler. migrate seeds the partition rows.
      BOUNDFLOW_NUM_PARTITIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: .
    command: ["-mode=server"]
    environment:
      BOUNDFLOW_DATABASE_URL: postgres://boundflow:boundflow@postgres:5432/boundflow?sslmode=disable
      BOUNDFLOW_GRPC_PORT: "50051"
      BOUNDFLOW_NUM_PARTITIONS: "1"
      BOUNDFLOW_PERIODIC_POLL_SECONDS: "30"
      BOUNDFLOW_DEBUG: "true"
      BOUNDFLOW_LOG_LEVEL: info
    ports:
      - "50051:50051"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build: .
    command: ["-mode=scheduler"]
    environment:
      BOUNDFLOW_DATABASE_URL: postgres://boundflow:boundflow@postgres:5432/boundflow?sslmode=disable
      BOUNDFLOW_NUM_PARTITIONS: "1"
      BOUNDFLOW_MAX_PARTITIONS_PER_SCHEDULER: "1"
      BOUNDFLOW_PERIODIC_POLL_SECONDS: "30"
      BOUNDFLOW_LOG_LEVEL: info
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["-mode=worker"]
    environment:
      BOUNDFLOW_DATABASE_URL: postgres://boundflow:boundflow@postgres:5432/boundflow?sslmode=disable
      BOUNDFLOW_WORKER_GRPC_PORT: "50052"
      BOUNDFLOW_JOB_TIMEOUT_SECS: "300"
      BOUNDFLOW_LOG_LEVEL: info
    ports:
      - "50052:50052"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
