syntax = "proto3";

package boundflow.v1;

option go_package = "github.com/boundflow/boundflow/gen/boundflow/v1;boundflowv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "boundflow/v1/workflow.proto";

service WorkflowService {
  rpc CreateWorkflow(CreateWorkflowRequest) returns (CreateWorkflowResponse);
  rpc InvokeWorkflow(InvokeWorkflowRequest) returns (InvokeWorkflowResponse);
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);

  rpc SetAgentRuntimePolicy(SetAgentRuntimePolicyRequest) returns (SetAgentRuntimePolicyResponse);
  rpc SetAgentLifecyclePolicy(SetAgentLifecyclePolicyRequest) returns (SetAgentLifecyclePolicyResponse);
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);

  rpc SetWorkflowLifecyclePolicy(SetWorkflowLifecyclePolicyRequest) returns (SetWorkflowLifecyclePolicyResponse);
  rpc ApproveWorkflow(ApproveWorkflowRequest) returns (ApproveWorkflowResponse);
  rpc RejectWorkflow(RejectWorkflowRequest) returns (RejectWorkflowResponse);
  rpc GetApprovalAudit(GetApprovalAuditRequest) returns (GetApprovalAuditResponse);
  rpc ActivateWorkflow(ActivateWorkflowRequest) returns (ActivateWorkflowResponse);
}

message CreateWorkflowRequest {
  string correlation_id = 1;
  string workflow_type = 2;
  string tenant_id = 3;
  reserved 4; // was: initial_state (unused customer-state blob, removed with ConvergePlane cleanup)
  // Deprecated: use workflow_config.invoke_timeout_seconds instead.
  int32 operation_timeout_seconds = 5;
  WorkflowConfig workflow_config = 6;
}

message CreateWorkflowResponse {
  Workflow workflow = 1;
}

// ListWorkflows returns the caller's workflows (scoped to their tenant group by
// the API-key auth interceptor). A read-only observability primitive.
message ListWorkflowsRequest {}

message ListWorkflowsResponse {
  repeated Workflow workflows = 1;
}

message RuntimeOverrides {
  int32 operation_timeout_seconds = 2;
}

message InvokeWorkflowRequest {
  string correlation_id = 1;
  string workflow_id = 2;
  RuntimeOverrides runtime_overrides = 3;
}

message InvokeWorkflowResponse {
  string request_id = 1;
}

message DeleteWorkflowRequest {
  string correlation_id = 1;
  string workflow_id = 2;
  int32 operation_timeout_seconds = 3;
}

message DeleteWorkflowResponse {
  string request_id = 1;
}

message GetWorkflowRequest {
  string workflow_id = 1;
}

message GetWorkflowResponse {
  Workflow workflow = 1;
}

message SetAgentRuntimePolicyRequest {
  string workflow_id = 1;
  string agent_name            = 2;
  // Serialised AgentRuntimePolicy JSON.
  google.protobuf.Struct runtime_policy = 3;
}

message SetAgentRuntimePolicyResponse {}

message SetAgentLifecyclePolicyRequest {
  string workflow_id = 1;
  string agent_name            = 2;
  // Serialised AgentLifecyclePolicy JSON.
  google.protobuf.Struct lifecycle_policy = 3;
}

message SetAgentLifecyclePolicyResponse {}

message DeleteAgentRequest {
  string workflow_id = 1;
  string agent_name            = 2;
}

message DeleteAgentResponse {}

// --- Workflow lifecycle policy ---

enum WorkflowMetric {
  WORKFLOW_METRIC_NUM_FAILURES         = 0;
  WORKFLOW_METRIC_COST                 = 1;
  WORKFLOW_METRIC_NUM_LLM_CALLS        = 2;
  WORKFLOW_METRIC_LATENCY              = 3;
  WORKFLOW_METRIC_APPROVAL_REJECTIONS  = 4;
  WORKFLOW_METRIC_TOOL_FAILURE_RATE    = 5;
}

enum WorkflowPolicyActionType {
  WORKFLOW_POLICY_ACTION_PAUSE       = 0;
  WORKFLOW_POLICY_ACTION_COOLDOWN    = 1;
  WORKFLOW_POLICY_ACTION_SET_VERSION = 2;
}

message WorkflowLifecyclePolicyAction {
  WorkflowPolicyActionType type = 1;
  // Populated when type = COOLDOWN.
  int32 cooldown_seconds = 2;
  // Populated when type = SET_VERSION: the version to roll to.
  int32 target_version = 3;
}

message WorkflowLifecyclePolicyRule {
  WorkflowMetric metric = 1;
  double threshold = 2;
  // Number of recent runs to evaluate. 0 = version-total (only valid with SET_VERSION).
  int32 window = 3;
  // Only for TOOL_FAILURE_RATE: names the specific callback to track.
  string tool_name = 4;
  WorkflowLifecyclePolicyAction action = 5;
}

message WorkflowLifecyclePolicy {
  repeated WorkflowLifecyclePolicyRule rules = 1;
}

message SetWorkflowLifecyclePolicyRequest {
  string workflow_id = 1;
  WorkflowLifecyclePolicy lifecycle_policy = 2;
}

message SetWorkflowLifecyclePolicyResponse {}

message ApproveWorkflowRequest {
  string workflow_id = 1;
  string approval_id          = 2;
  // Who made the decision, as the customer's gate identifies them (free-form,
  // e.g. an email or user id). Recorded for the approval audit trace.
  string actor                = 3;
}

message ApproveWorkflowResponse {}

message RejectWorkflowRequest {
  string workflow_id = 1;
  string approval_id          = 2;
  string actor                = 3;
}

enum ApprovalDecision {
  APPROVAL_DECISION_UNSPECIFIED = 0;
  APPROVAL_DECISION_APPROVED    = 1;
  APPROVAL_DECISION_REJECTED    = 2;
  APPROVAL_DECISION_TIMED_OUT   = 3;
}

// GetApprovalAudit reads approval-decision history (tenant-scoped via the API
// key). Filters are optional and AND together; omit all to list the tenant's
// recent approvals. Correlate with the trace via approval_id.
message GetApprovalAuditRequest {
  string workflow_id = 1;
  string approval_id = 2;
}

message GetApprovalAuditResponse {
  repeated ApprovalAuditRecord records = 1;
}

message ApprovalAuditRecord {
  string approval_id                   = 1;
  string workflow_id                   = 2;
  string request_id                    = 3;
  ApprovalDecision decision            = 4;
  google.protobuf.Timestamp opened_at  = 5;
  google.protobuf.Timestamp decided_at = 6;
  string actor                         = 7;  // customer-supplied; empty on timeout
}

message RejectWorkflowResponse {}

message ActivateWorkflowRequest {
  string workflow_id = 1;
}

message ActivateWorkflowResponse {}
