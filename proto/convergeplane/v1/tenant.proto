syntax = "proto3";

package convergeplane.v1;

option go_package = "github.com/convergeplane/convergeplane/gen/convergeplane/v1;convergeplanev1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "convergeplane/v1/policy.proto";

message TenantGroup {
  string id = 1;
  string name = 2;
  repeated Tenant tenants = 3;
  PolicySet policies = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Tenant {
  string id = 1;
  string name = 2;
  string tenant_group_id = 3;
  repeated Resource resources = 4;
  PolicySet policy_overrides = 5;
  google.protobuf.Timestamp created_at = 6;
}

message Resource {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Struct current_state = 3;
  google.protobuf.Struct goal_state = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}
