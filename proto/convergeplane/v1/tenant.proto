syntax = "proto3";

package convergeplane.v1;

option go_package = "github.com/convergeplane/convergeplane/gen/convergeplane/v1;convergeplanev1";

import "google/protobuf/timestamp.proto";
import "convergeplane/v1/policy.proto";

message Tenant {
  string id = 1;
  string name = 2;
  optional string tenant_group_id = 3;
  PolicySet policy_overrides = 4;
  google.protobuf.Timestamp created_at = 5;
}
