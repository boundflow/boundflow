syntax = "proto3";

package convergeplane.v1;

option go_package = "github.com/convergeplane/convergeplane/gen/convergeplane/v1;convergeplanev1";

import "convergeplane/v1/operation.proto";

// WorkerService is the internal API that worker instances connect to.
// Workers register handlers for resource types and callback types,
// poll for scheduled operations, execute customer-defined logic,
// and report results back.
service WorkerService {
  rpc RegisterHandler(RegisterHandlerRequest) returns (RegisterHandlerResponse);
  rpc PollForWork(PollForWorkRequest) returns (PollForWorkResponse);
  rpc CompleteOperation(CompleteOperationRequest) returns (CompleteOperationResponse);
}

message RegisterHandlerRequest {
  string worker_id = 1;
  string resource_type = 2;
  CallbackType callback_type = 3;
}

message RegisterHandlerResponse {}

enum CallbackType {
  CALLBACK_TYPE_UNSPECIFIED = 0;
  CALLBACK_TYPE_CREATE = 1;
  CALLBACK_TYPE_RECONCILE = 2;
  CALLBACK_TYPE_DELETE = 3;
  CALLBACK_TYPE_HEALTH = 4;
}

message PollForWorkRequest {
  string worker_id = 1;
}

message PollForWorkResponse {
  AtomicOperation operation = 1;
}

message CompleteOperationRequest {
  string worker_id = 1;
  string operation_id = 2;
  AtomicOperationResult result = 3;
}

message CompleteOperationResponse {}
