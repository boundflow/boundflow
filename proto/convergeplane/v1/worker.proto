syntax = "proto3";

package convergeplane.v1;

option go_package = "github.com/convergeplane/convergeplane/gen/convergeplane/v1;convergeplanev1";

import "convergeplane/v1/operation.proto";

// WorkerService is implemented by the worker (customer SDK).
// The worker connects as a gRPC client, but the service initiates
// all calls — launching operations and checking their status.
service WorkerService {
  rpc LaunchOperation(LaunchOperationRequest) returns (LaunchOperationResponse);
  rpc GetOperationStatus(GetOperationStatusRequest) returns (GetOperationStatusResponse);
}

message LaunchOperationRequest {
  AtomicOperation operation = 1;
}

message LaunchOperationResponse {
  bool success = 1;
  string operation_id = 2;
  string message = 3;
}

message GetOperationStatusRequest {
  string operation_id = 1;
}

message GetOperationStatusResponse {
  AtomicOperationResult result = 1;
}
