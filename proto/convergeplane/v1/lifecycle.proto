syntax = "proto3";

package convergeplane.v1;

option go_package = "github.com/convergeplane/convergeplane/gen/convergeplane/v1;convergeplanev1";

import "google/protobuf/struct.proto";
import "convergeplane/v1/resource_instance.proto";

service ResourceLifecycleService {
  rpc CreateResource(CreateResourceRequest) returns (CreateResourceResponse);
  rpc ReconcileResource(ReconcileResourceRequest) returns (ReconcileResourceResponse);
  rpc DeleteResource(DeleteResourceRequest) returns (DeleteResourceResponse);
  rpc GetResourceState(GetResourceStateRequest) returns (GetResourceStateResponse);

  rpc SetAgentRuntimePolicy(SetAgentRuntimePolicyRequest) returns (SetAgentRuntimePolicyResponse);
  rpc SetAgentLifecyclePolicy(SetAgentLifecyclePolicyRequest) returns (SetAgentLifecyclePolicyResponse);
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);
}

message CreateResourceRequest {
  string correlation_id = 1;
  string resource_type = 2;
  string tenant_id = 3;
  google.protobuf.Struct initial_state = 4;
  // Deprecated: use workflow_config.invoke_timeout_seconds instead.
  int32 operation_timeout_seconds = 5;
  WorkflowConfig workflow_config = 6;
}

message CreateResourceResponse {
  ResourceInstance resource_instance = 1;
}

message ReconcileResourceRequest {
  string correlation_id = 1;
  string resource_instance_id = 2;
  google.protobuf.Struct goal_state = 3;
  int32 operation_timeout_seconds = 4;
}

message ReconcileResourceResponse {
  string request_id = 1;
}

message DeleteResourceRequest {
  string correlation_id = 1;
  string resource_instance_id = 2;
  int32 operation_timeout_seconds = 3;
}

message DeleteResourceResponse {
  string request_id = 1;
}

message GetResourceStateRequest {
  string resource_instance_id = 1;
}

message GetResourceStateResponse {
  ResourceInstance resource_instance = 1;
}

message SetAgentRuntimePolicyRequest {
  string resource_instance_id = 1;
  string agent_name            = 2;
  // Serialised AgentRuntimePolicy JSON.
  google.protobuf.Struct runtime_policy = 3;
}

message SetAgentRuntimePolicyResponse {}

message SetAgentLifecyclePolicyRequest {
  string resource_instance_id = 1;
  string agent_name            = 2;
  // Serialised AgentLifecyclePolicy JSON.
  google.protobuf.Struct lifecycle_policy = 3;
}

message SetAgentLifecyclePolicyResponse {}

message DeleteAgentRequest {
  string resource_instance_id = 1;
  string agent_name            = 2;
}

message DeleteAgentResponse {}
