syntax = "proto3";

package convergeplane.v1;

option go_package = "github.com/convergeplane/convergeplane/gen/convergeplane/v1;convergeplanev1";

import "google/protobuf/struct.proto";
import "convergeplane/v1/resource.proto";

// ResourceLifecycleService is the customer-facing API for requesting
// resource lifecycle actions. The platform internally translates these
// into operations and schedules them via workers.
service ResourceLifecycleService {
  rpc CreateResource(CreateResourceRequest) returns (CreateResourceResponse);
  rpc ReconcileResource(ReconcileResourceRequest) returns (ReconcileResourceResponse);
  rpc DeleteResource(DeleteResourceRequest) returns (DeleteResourceResponse);
  rpc GetResourceHealth(GetResourceHealthRequest) returns (GetResourceHealthResponse);
}

message CreateResourceRequest {
  string resource_id = 1;
  google.protobuf.Struct initial_state = 2;
}

message CreateResourceResponse {
  Resource resource = 1;
}

message ReconcileResourceRequest {
  string resource_id = 1;
  google.protobuf.Struct goal_state = 2;
}

message ReconcileResourceResponse {
  string request_id = 1;
}

message DeleteResourceRequest {
  string resource_id = 1;
}

message DeleteResourceResponse {
  string request_id = 1;
}

message GetResourceHealthRequest {
  string resource_id = 1;
  google.protobuf.Struct expected_state = 2;
}

message GetResourceHealthResponse {
  bool healthy = 1;
  string message = 2;
}
