name: Publish SDK to PyPI

# Builds the boundflow wheel + sdist and publishes to PyPI. Runs on the same
# version tags (v*) as the backend image, so the SDK and backend release in
# lockstep. Also runs on manual dispatch.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token to store. One-time setup:
# on PyPI, add a trusted publisher for this repo with
#   workflow: publish-sdk.yml   environment: pypi
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read   # checkout needs read access to the (private) repo
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel + sdist
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
