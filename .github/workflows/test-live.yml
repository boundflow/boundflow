name: Live tests (real LLM)

# The integration tests that make real Anthropic calls. Runs on PRs, nightly, and
# on demand; requires the ANTHROPIC_API_KEY repo secret. Fork PRs can't access the
# secret, so the job below skips gracefully for them.
on:
  pull_request:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.decide.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            code:
              - '**'
              - '!landing/**'
              - '!docs/**'
              - '!demo/**'
              - '!mkdocs.yml'
              - '!**/*.md'
      # schedule/workflow_dispatch runs have no diff to filter -- always run the full suite then.
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

  live:
    name: Python SDK (real LLM)
    needs: changes
    runs-on: ubuntu-latest
    # Skip gracefully if the secret isn't configured (e.g. on a fork) or nothing code-relevant changed.
    if: ${{ github.repository == 'boundflow/boundflow' && needs.changes.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Start backend
        run: docker compose up -d --build --wait

      - name: Wait for gRPC ports
        run: timeout 60 bash -c 'until nc -z localhost 50051 && nc -z localhost 50052; do sleep 1; done'

      - name: Provision an API key
        id: provision
        run: |
          key=$(docker compose run --rm server -mode=provision -name=ci | awk '/^api_key[[:space:]]+:/{print $NF}')
          test -n "$key"
          echo "::add-mask::$key"
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK + test deps
        working-directory: sdk/python
        run: pip install -e ".[dev]"

      - name: Run full suite (incl. real-LLM tests)
        working-directory: sdk/python
        env:
          BOUNDFLOW_API_KEY: ${{ steps.provision.outputs.key }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pytest -v

      - name: Backend logs on failure
        if: failure()
        run: docker compose logs --tail 100 server scheduler worker
