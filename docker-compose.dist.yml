# Distribution compose — runs the BoundFlow backend from the published image,
# no source checkout or Go toolchain required.
#
#   docker compose -f docker-compose.dist.yml up -d
#   docker compose -f docker-compose.dist.yml run --rm server -mode=provision -name=me
#
# Pin a specific version by setting BOUNDFLOW_IMAGE, e.g.:
#   BOUNDFLOW_IMAGE=ghcr.io/boundflow/boundflow:v0.1.0 docker compose -f docker-compose.dist.yml up -d
#
# The backend is open source under Apache-2.0 (see LICENSE).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boundflow
      POSTGRES_USER: boundflow
      # Required: set BOUNDFLOW_DB_PASSWORD in .env to a strong secret (copy
      # .env.example). No default is shipped — a deploy must not run on a known
      # password. (The dev compose, docker-compose.yml, keeps a local default.)
      POSTGRES_PASSWORD: ${BOUNDFLOW_DB_PASSWORD:?set BOUNDFLOW_DB_PASSWORD in .env — see .env.example}
    # Not published to the host; inspect with:
    #   docker compose -f docker-compose.dist.yml exec postgres psql -U boundflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boundflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ${BOUNDFLOW_IMAGE:-ghcr.io/boundflow/boundflow:latest}
    command: ["-mode=migrate"]
    environment:
      BOUNDFLOW_DATABASE_URL: ${BOUNDFLOW_DATABASE_URL:-postgres://boundflow:${BOUNDFLOW_DB_PASSWORD:?set BOUNDFLOW_DB_PASSWORD in .env — see .env.example}@postgres:5432/boundflow?sslmode=disable}
      # Shard count — must match the server/scheduler. migrate seeds the partition rows.
      BOUNDFLOW_NUM_PARTITIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy

  server:
    image: ${BOUNDFLOW_IMAGE:-ghcr.io/boundflow/boundflow:latest}
    command: ["-mode=server"]
    environment:
      BOUNDFLOW_DATABASE_URL: ${BOUNDFLOW_DATABASE_URL:-postgres://boundflow:${BOUNDFLOW_DB_PASSWORD:?set BOUNDFLOW_DB_PASSWORD in .env — see .env.example}@postgres:5432/boundflow?sslmode=disable}
      BOUNDFLOW_GRPC_PORT: "50051"
      BOUNDFLOW_NUM_PARTITIONS: "1"
      BOUNDFLOW_DEBUG: "true"
      BOUNDFLOW_LOG_LEVEL: info
    ports:
      - "50051:50051"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    image: ${BOUNDFLOW_IMAGE:-ghcr.io/boundflow/boundflow:latest}
    command: ["-mode=scheduler"]
    environment:
      BOUNDFLOW_DATABASE_URL: ${BOUNDFLOW_DATABASE_URL:-postgres://boundflow:${BOUNDFLOW_DB_PASSWORD:?set BOUNDFLOW_DB_PASSWORD in .env — see .env.example}@postgres:5432/boundflow?sslmode=disable}
      BOUNDFLOW_NUM_PARTITIONS: "1"
      BOUNDFLOW_MAX_PARTITIONS_PER_SCHEDULER: "1"
      BOUNDFLOW_LOG_LEVEL: info
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    image: ${BOUNDFLOW_IMAGE:-ghcr.io/boundflow/boundflow:latest}
    command: ["-mode=worker"]
    environment:
      BOUNDFLOW_DATABASE_URL: ${BOUNDFLOW_DATABASE_URL:-postgres://boundflow:${BOUNDFLOW_DB_PASSWORD:?set BOUNDFLOW_DB_PASSWORD in .env — see .env.example}@postgres:5432/boundflow?sslmode=disable}
      BOUNDFLOW_WORKER_GRPC_PORT: "50052"
      BOUNDFLOW_JOB_TIMEOUT_SECS: "300"
      BOUNDFLOW_LOG_LEVEL: info
    ports:
      - "50052:50052"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
